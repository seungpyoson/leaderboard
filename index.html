<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Crypto Leaderboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1800px; margin: 0 auto; padding: 24px 16px; }
        header { margin-bottom: 32px; }
        h1 { font-size: 24px; font-weight: 600; color: #fff; margin-bottom: 4px; }
        .subtitle { font-size: 14px; color: #666; }
        .updated { font-size: 12px; color: #444; margin-top: 8px; }
        .filters {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 14px; border-radius: 6px; border: 1px solid #222;
            background: #111; color: #888; font-size: 13px; cursor: pointer;
            transition: all 0.15s;
        }
        .filter-btn:hover { border-color: #444; color: #ccc; }
        .filter-btn.active { border-color: #4ade80; color: #4ade80; background: #0a1f0a; }
        .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #1a1a1a; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead { position: sticky; top: 0; z-index: 1; }
        th {
            background: #111; padding: 8px 10px; text-align: right; font-weight: 500;
            color: #666; border-bottom: 1px solid #222; cursor: pointer;
            user-select: none; white-space: nowrap; position: relative;
        }
        th:first-child, th:nth-child(2) { text-align: left; }
        th:hover { color: #aaa; }
        th.sorted-asc::after { content: ' \25B2'; color: #4ade80; }
        th.sorted-desc::after { content: ' \25BC'; color: #4ade80; }
        th[title] { border-bottom: 1px dashed #333; }
        td {
            padding: 8px 10px; border-bottom: 1px solid #141414;
            text-align: right; white-space: nowrap;
        }
        td:first-child { text-align: center; color: #444; font-size: 11px; }
        td:nth-child(2) { text-align: left; }
        tr:hover td { background: #111; }
        .name-cell { display: flex; align-items: center; gap: 8px; }
        .name-link {
            color: #e0e0e0; text-decoration: none; font-weight: 500;
        }
        .name-link:hover { color: #4ade80; }
        .style-tag {
            font-size: 10px; padding: 2px 6px; border-radius: 3px;
            font-weight: 500; letter-spacing: 0.3px;
        }
        .style-hft { background: #1a1a2e; color: #818cf8; }
        .style-dir { background: #1a2e1a; color: #4ade80; }
        .style-hyb { background: #2e2a1a; color: #fbbf24; }
        .positive { color: #4ade80; }
        .negative { color: #f87171; }
        .muted { color: #333; }
        .col-group { border-left: 1px solid #222; }
        .group-label {
            font-size: 10px; color: #444; text-transform: uppercase;
            letter-spacing: 0.5px; padding: 4px 10px; background: #0d0d0d;
            border-bottom: 1px solid #1a1a1a; text-align: center;
        }
        @media (max-width: 768px) {
            .container { padding: 16px 8px; }
            table { font-size: 11px; }
            th, td { padding: 6px 4px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Polymarket Crypto Leaderboard</h1>
            <div class="subtitle">Top crypto interval traders — crypto-category performance from Polymarket leaderboard API</div>
            <div class="updated" id="updated"></div>
        </header>

        <!-- Style filters removed — leaderboard API doesn't provide style classification
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="HFT/MM">HFT / MM</button>
            <button class="filter-btn" data-filter="Directional">Directional</button>
            <button class="filter-btn" data-filter="Hybrid">Hybrid</button>
        </div>
        -->

        <div class="table-wrap">
            <table>
                <thead>
                    <tr class="group-row">
                        <td colspan="2"></td>
                        <td class="group-label" colspan="3">Crypto Performance</td>
                    </tr>
                    <tr>
                        <th data-col="rank">#</th>
                        <th data-col="name">Name</th>
                        <th data-col="pnl" title="Crypto-category PnL from Polymarket leaderboard API">PnL</th>
                        <th data-col="volume" title="Crypto-category volume from Polymarket leaderboard API">Volume</th>
                        <th data-col="efficiency" title="Crypto PnL / Crypto Volume * 100">Efficiency</th>
                        <!-- Hidden: all-market columns (not crypto-specific)
                        <th data-col="positions_value" title="Current value of all open positions in USDC">Positions</th>
                        <th data-col="biggest_win" title="Largest single winning trade in USDC">Best Win</th>
                        <th data-col="markets" title="Number of unique markets traded (Polymarket API)">Markets</th>
                        <th data-col="trades" title="Total number of trades placed (Polymarket API)">Trades</th>
                        -->
                        <!-- Hidden: on-chain fills (deferred to #26)
                        <th data-col="total_fills" class="col-group">Fills</th>
                        <th data-col="fills_sent">Maker</th>
                        <th data-col="fills_received">Taker</th>
                        <th data-col="maker_taker_ratio">M/T</th>
                        <th data-col="trading_days">Days</th>
                        <th data-col="win_rate_pct" class="col-group">Win %</th>
                        <th data-col="sharpe">Sharpe</th>
                        <th data-col="pnl_per_fill_cents">PnL/Fill</th>
                        <th data-col="trading_hours">Hours</th>
                        -->
                        <!-- Hidden: capital columns (Dune, deferred)
                        <th data-col="initial_deposit" class="col-group">1st Dep</th>
                        <th data-col="cumul_deposits">Deposits</th>
                        <th data-col="total_withdrawn">Withdrawn</th>
                        <th data-col="roic_pct">ROIC</th>
                        <th data-col="top_market">Top Mkt</th>
                        -->
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <script>
    let profiles = [];
    let sortCol = 'pnl';
    let sortDir = 'desc';
    let activeFilter = 'all';

    async function init() {
        const resp = await fetch('data/profiles.json');
        const data = await resp.json();
        profiles = data.profiles;
        document.getElementById('updated').textContent = `Last updated: ${data.updated}`;
        render();
        bindEvents();
    }

    function fmtMoney(val) {
        if (val == null) return '<span class="muted">\u2014</span>';
        const v = Number(val);
        const cls = v >= 0 ? 'positive' : 'negative';
        let str;
        if (Math.abs(v) >= 1e6) str = `$${(v / 1e6).toFixed(2)}M`;
        else if (Math.abs(v) >= 1e3) str = `$${(v / 1e3).toFixed(1)}K`;
        else str = `$${v.toFixed(0)}`;
        return `<span class="${cls}">${str}</span>`;
    }

    function fmtPct(val) {
        if (val == null) return '<span class="muted">\u2014</span>';
        const v = Number(val);
        return `<span class="${v >= 0 ? 'positive' : 'negative'}">${v.toFixed(2)}%</span>`;
    }

    function fmtNum(val) {
        if (val == null) return '<span class="muted">\u2014</span>';
        return Number(val).toLocaleString();
    }

    function fmtDec(val, dp) {
        if (val == null) return '<span class="muted">\u2014</span>';
        return Number(val).toFixed(dp);
    }

    function fmtMT(val) {
        if (val == null) return '<span class="muted">\u2014</span>';
        const v = Number(val);
        const badge = v > 2 ? ' <span class="style-tag style-hft">M</span>'
                    : v < 0.5 ? ' <span class="style-tag style-dir">T</span>'
                    : '';
        return v.toFixed(1) + badge;
    }

    function styleTag(style) {
        const cls = style === 'HFT/MM' ? 'style-hft' : style === 'Directional' ? 'style-dir' : 'style-hyb';
        const label = style === 'HFT/MM' ? 'HFT' : style === 'Directional' ? 'DIR' : 'HYB';
        return `<span class="style-tag ${cls}">${label}</span>`;
    }

    function escHtml(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
    }

    function getSortVal(p, col) {
        if (col === 'name') return (p.name || '').toLowerCase();
        return p[col] != null ? Number(p[col]) : -Infinity;
    }

    function render() {
        const filtered = profiles;

        const sorted = [...filtered].sort((a, b) => {
            const av = getSortVal(a, sortCol);
            const bv = getSortVal(b, sortCol);
            const cmp = av < bv ? -1 : av > bv ? 1 : 0;
            return sortDir === 'asc' ? cmp : -cmp;
        });

        const m = '<span class="muted">\u2014</span>';
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = sorted.map((p, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>
                    <a class="name-link" href="${escHtml(p.profile_url)}" target="_blank" rel="noopener">${escHtml(p.name)}</a>
                </td>
                <td>${fmtMoney(p.pnl)}</td>
                <td>${fmtMoney(p.volume)}</td>
                <td>${fmtPct(p.efficiency)}</td>
            </tr>
        `).join('');

        document.querySelectorAll('th').forEach(th => {
            th.classList.remove('sorted-asc', 'sorted-desc');
            if (th.dataset.col === sortCol) {
                th.classList.add(sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc');
            }
        });
    }

    function bindEvents() {
        document.querySelectorAll('th[data-col]').forEach(th => {
            th.addEventListener('click', () => {
                const col = th.dataset.col;
                if (col === sortCol) {
                    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
                } else {
                    sortCol = col;
                    sortDir = col === 'name' ? 'asc' : 'desc';
                }
                render();
            });
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.filter;
                render();
            });
        });
    }

    init();
    </script>
</body>
</html>
