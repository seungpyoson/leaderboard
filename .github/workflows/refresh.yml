name: Refresh leaderboard data

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Goldsky pipeline
        run: python3 scraper/goldsky_pipeline.py --max-minutes 300

      - name: Fetch profiles
        run: python3 scraper/fetch.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/profiles.json scraper/dune-performance.csv scraper/goldsky_state.json
          git diff --cached --quiet || git commit -m "data: refresh profiles $(date -u +%Y-%m-%d)"
          git push
