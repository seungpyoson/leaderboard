name: Discover new traders

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Discover candidates
        run: python3 scraper/discover.py

      - name: Commit updated candidates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/candidates.json
          git diff --cached --quiet || git commit -m "data: discover candidates $(date -u +%Y-%m-%d)"
          git push
